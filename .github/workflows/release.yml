name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.10.0 --locked

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Collect artifacts to flat directory
        run: |
          mkdir -p flat-artifacts
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.tar.gz flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.tar.gz.sig flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm flat-artifacts/ 2>/dev/null || true
          echo "Collected artifacts:"
          ls -lh flat-artifacts/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-unknown-linux-gnu
          path: flat-artifacts/

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
            runner: macos-14
          - arch: x86_64
            target: x86_64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.10.0 --locked

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build (signed + notarized)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Rebuild DMG with appdmg
        run: ./scripts/rebuild-dmg.sh ${{ matrix.target }}

      - name: Collect artifacts
        run: |
          mkdir -p flat-artifacts
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          # Map arch to friendly name
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            FRIENDLY="Apple-Silicon"
          else
            FRIENDLY="Intel"
          fi

          # Updater bundles (.app.tar.gz + sig)
          for f in "$BUNDLE_DIR/macos/"*.app.tar.gz; do
            [ -f "$f" ] && cp "$f" "flat-artifacts/Corkscrew-${VERSION}-macOS-${FRIENDLY}.app.tar.gz"
          done
          for f in "$BUNDLE_DIR/macos/"*.app.tar.gz.sig; do
            [ -f "$f" ] && cp "$f" "flat-artifacts/Corkscrew-${VERSION}-macOS-${FRIENDLY}.app.tar.gz.sig"
          done

          # DMG installer
          for f in "$BUNDLE_DIR/dmg/"*.dmg; do
            [ -f "$f" ] && cp "$f" "flat-artifacts/Corkscrew-${VERSION}-macOS-${FRIENDLY}.dmg"
          done

          echo "Collected artifacts:"
          ls -lh flat-artifacts/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: flat-artifacts/

  release:
    name: Publish Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all CI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename Linux artifacts to friendly names
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          DIR=artifacts/linux-x86_64-unknown-linux-gnu

          cd "$DIR"
          for f in *; do
            case "$f" in
              *.AppImage.tar.gz.sig) mv "$f" "Corkscrew-${VERSION}-Linux.AppImage.tar.gz.sig" ;;
              *.AppImage.tar.gz)     mv "$f" "Corkscrew-${VERSION}-Linux.AppImage.tar.gz" ;;
              *.AppImage.sig)        mv "$f" "Corkscrew-${VERSION}-Linux.AppImage.sig" ;;
              *.AppImage)            mv "$f" "Corkscrew-${VERSION}-Linux.AppImage" ;;
              *.deb)                 mv "$f" "Corkscrew-${VERSION}-Linux.deb" ;;
              *.rpm)                 mv "$f" "Corkscrew-${VERSION}-Linux.rpm" ;;
            esac
          done
          cd -

      - name: List all downloaded artifacts
        run: find artifacts/ -type f | sort

      - name: Build latest.json for updater (all platforms)
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/build-latest-json.py artifacts/ > latest.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            artifacts/linux-x86_64-unknown-linux-gnu/*
            artifacts/macos-aarch64-apple-darwin/*
            artifacts/macos-x86_64-apple-darwin/*
            latest.json

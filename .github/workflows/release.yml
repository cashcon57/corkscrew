name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.10.0 --locked

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Collect artifacts to flat directory
        run: |
          mkdir -p flat-artifacts
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.tar.gz flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.tar.gz.sig flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb flat-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm flat-artifacts/ 2>/dev/null || true
          echo "Collected artifacts:"
          ls -lh flat-artifacts/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-unknown-linux-gnu
          path: flat-artifacts/

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
            runner: macos-14
          - arch: x86_64
            target: x86_64-apple-darwin
            runner: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.10.0 --locked

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Collect artifacts
        run: |
          mkdir -p flat-artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          cp "$BUNDLE_DIR/macos/"*.app.tar.gz flat-artifacts/Corkscrew_${{ matrix.arch }}.app.tar.gz 2>/dev/null || true
          cp "$BUNDLE_DIR/macos/"*.app.tar.gz.sig flat-artifacts/Corkscrew_${{ matrix.arch }}.app.tar.gz.sig 2>/dev/null || true
          cp "$BUNDLE_DIR/dmg/"*.dmg flat-artifacts/ 2>/dev/null || true
          echo "Collected artifacts:"
          ls -lh flat-artifacts/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: flat-artifacts/

  release:
    name: Publish Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all CI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename Linux artifacts to friendly names
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          DIR=artifacts/linux-x86_64-unknown-linux-gnu

          cd "$DIR"
          for f in *; do
            case "$f" in
              *.AppImage.tar.gz.sig) mv "$f" "Corkscrew-${VERSION}-Linux.AppImage.tar.gz.sig" ;;
              *.AppImage.tar.gz)     mv "$f" "Corkscrew-${VERSION}-Linux.AppImage.tar.gz" ;;
              *.AppImage.sig)        mv "$f" "Corkscrew-${VERSION}-Linux.AppImage.sig" ;;
              *.AppImage)            mv "$f" "Corkscrew-${VERSION}-Linux.AppImage" ;;
              *.deb)                 mv "$f" "Corkscrew-${VERSION}-Linux.deb" ;;
              *.rpm)                 mv "$f" "Corkscrew-${VERSION}-Linux.rpm" ;;
            esac
          done
          cd -

      - name: Rename macOS DMGs to friendly names
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          for dir in artifacts/macos-*; do
            [ -d "$dir" ] || continue
            for f in "$dir"/*.dmg; do
              [ -f "$f" ] || continue
              arch=$(basename "$dir" | sed 's/macos-\(.*\)-apple-darwin/\1/')
              if [ "$arch" = "aarch64" ]; then
                mv "$f" "$dir/Corkscrew-${VERSION}-macOS-Apple-Silicon.dmg"
              elif [ "$arch" = "x86_64" ]; then
                mv "$f" "$dir/Corkscrew-${VERSION}-macOS-Intel.dmg"
              fi
            done
          done

      - name: Build latest.json for updater (all platforms)
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/build-latest-json.py artifacts/ > latest.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            artifacts/linux-x86_64-unknown-linux-gnu/*
            artifacts/macos-aarch64-apple-darwin/*
            artifacts/macos-x86_64-apple-darwin/*
            latest.json

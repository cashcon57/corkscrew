name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.10.0 --locked

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-unknown-linux-gnu
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.tar.gz
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.sig
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

  release:
    name: Publish Release
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux CI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Download macOS artifacts from draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mkdir -p artifacts/macos-aarch64-apple-darwin artifacts/macos-x86_64-apple-darwin

          echo "Downloading macOS updater artifacts from release $TAG..."

          gh release download "$TAG" \
            -p "Corkscrew_aarch64.app.tar.gz" \
            -p "Corkscrew_aarch64.app.tar.gz.sig" \
            -D artifacts/macos-aarch64-apple-darwin 2>/dev/null \
            && echo "  ✓ macOS aarch64 updater artifacts downloaded" \
            || echo "  ⚠ macOS aarch64 updater artifacts not found (release will be Linux-only)"

          gh release download "$TAG" \
            -p "Corkscrew_x86_64.app.tar.gz" \
            -p "Corkscrew_x86_64.app.tar.gz.sig" \
            -D artifacts/macos-x86_64-apple-darwin 2>/dev/null \
            && echo "  ✓ macOS x86_64 updater artifacts downloaded" \
            || echo "  ⚠ macOS x86_64 updater artifacts not found (release will be Linux-only)"

          echo ""
          echo "Artifact directories:"
          ls -lhR artifacts/ 2>/dev/null || true

      - name: Rename Linux artifacts to friendly names
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          DIR=artifacts/linux-x86_64-unknown-linux-gnu

          cd "$DIR"
          for f in *; do
            case "$f" in
              *.AppImage.tar.gz.sig) mv "$f" "Corkscrew-${VERSION}-Linux.AppImage.tar.gz.sig" ;;
              *.AppImage.tar.gz)     mv "$f" "Corkscrew-${VERSION}-Linux.AppImage.tar.gz" ;;
              *.AppImage.sig)        mv "$f" "Corkscrew-${VERSION}-Linux.AppImage.sig" ;;
              *.AppImage)            mv "$f" "Corkscrew-${VERSION}-Linux.AppImage" ;;
              *.deb)                 mv "$f" "Corkscrew-${VERSION}-Linux.deb" ;;
              *.rpm)                 mv "$f" "Corkscrew-${VERSION}-Linux.rpm" ;;
            esac
          done
          cd -

      - name: Build latest.json for updater
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/build-latest-json.py artifacts/ > latest.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            artifacts/linux-x86_64-unknown-linux-gnu/*
            latest.json
